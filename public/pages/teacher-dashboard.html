<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - Sistem Informasi Sekolah</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-chalkboard-user"></i>
                </div>
                <div class="sidebar-title" id="teacherName">Guru</div>
                <div class="sidebar-subtitle" id="teacherSubject">Matematika</div>
            </div>

            <nav class="sidebar-menu">
                <!-- Dashboard Section -->
                <div class="menu-section">
                    <div class="menu-section-title">Menu Utama</div>
                    <a href="#" class="menu-item active" onclick="loadPage('dashboard')">
                        <i class="fas fa-home"></i> Dashboard
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('profile')">
                        <i class="fas fa-user"></i> Profil Saya
                    </a>
                </div>

                <!-- Teaching Section -->
                <div class="menu-section">
                    <div class="menu-section-title">Mengajar</div>
                    <a href="#" class="menu-item" onclick="loadPage('classes')">
                        <i class="fas fa-users"></i> Kelas Mengajar
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('schedule')">
                        <i class="fas fa-calendar-alt"></i> Jadwal Mengajar
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('attendance')">
                        <i class="fas fa-check-circle"></i> Absensi Siswa
                    </a>
                </div>

                <!-- Assessment Section -->
                <div class="menu-section">
                    <div class="menu-section-title">Penilaian</div>
                    <a href="#" class="menu-item" onclick="loadPage('grades')">
                        <i class="fas fa-chart-line"></i> Input Nilai
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('assignments')">
                        <i class="fas fa-tasks"></i> Tugas & PR
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('student-progress')">
                        <i class="fas fa-graduation-cap"></i> Progress Siswa
                    </a>
                </div>

                <!-- Communication Section -->
                <div class="menu-section">
                    <div class="menu-section-title">Komunikasi</div>
                    <a href="#" class="menu-item" onclick="loadPage('announcements')">
                        <i class="fas fa-bell"></i> Pengumuman
                    </a>
                    <a href="#" class="menu-item" onclick="loadPage('messages')">
                        <i class="fas fa-envelope"></i> Pesan
                    </a>
                </div>

                <!-- Other Section -->
                <div class="menu-section">
                    <div class="menu-section-title">Lainnya</div>
                    <a href="#" class="menu-item" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="page-title" id="pageTitle">Dashboard</div>
                <div class="user-menu">
                    <button class="btn-icon" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">5</span>
                    </button>
                    <button class="btn-icon" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="user-profile" onclick="toggleUserDropdown()">
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <span id="topbarName">Guru</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div id="mainContent"></div>
            </div>
        </main>
    </div>

    <!-- Default Dashboard Template -->
    <template id="dashboard-template">
        <div class="grid grid-3">
            <div class="card stat-card">
                <div class="stat-icon success">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value">125</div>
                    <div class="stat-label">Total Siswa</div>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-icon info">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value">45</div>
                    <div class="stat-label">Tugas Pending</div>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-icon warning">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-value">12</div>
                    <div class="stat-label">Jam Mengajar/Minggu</div>
                </div>
            </div>
        </div>

        <div class="grid grid-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Jadwal Hari Ini</h3>
                </div>
                <div class="card-body">
                    <div class="schedule-item">
                        <div class="schedule-time">08:00 - 09:00</div>
                        <div class="schedule-detail">
                            <div class="schedule-subject">Matematika - XII IPA 1</div>
                            <div class="schedule-teacher">Ruang: 12 IPA 1</div>
                        </div>
                    </div>
                    <div class="schedule-item">
                        <div class="schedule-time">09:00 - 10:00</div>
                        <div class="schedule-detail">
                            <div class="schedule-subject">Matematika - XII IPA 2</div>
                            <div class="schedule-teacher">Ruang: 12 IPA 2</div>
                        </div>
                    </div>
                    <div class="schedule-item">
                        <div class="schedule-time">10:15 - 11:15</div>
                        <div class="schedule-detail">
                            <div class="schedule-subject">Matematika - XII IPS 1</div>
                            <div class="schedule-teacher">Ruang: 12 IPS 1</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Pengumuman Penting</h3>
                </div>
                <div class="card-body">
                    <div class="announcement-item">
                        <div class="announcement-date">1 jam lalu</div>
                        <div class="announcement-text">Rapat guru akan dilakukan hari Jumat jam 14:00 di ruang pertemuan</div>
                    </div>
                    <div class="announcement-item">
                        <div class="announcement-date">3 jam lalu</div>
                        <div class="announcement-text">Pengumpulan nilai UAS harus selesai hari Kamis</div>
                    </div>
                    <div class="announcement-item">
                        <div class="announcement-date">1 hari lalu</div>
                        <div class="announcement-text">Pembagian rapor siswa minggu depan pukul 13:00</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Kelas Mengajar</h3>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Kelas</th>
                                <th>Siswa</th>
                                <th>Jam/Minggu</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>XII IPA 1</td>
                                <td>35</td>
                                <td>4 jam</td>
                                <td><span class="badge badge-success">Aktif</span></td>
                                <td><button class="btn-action" onclick="viewClass()">Lihat</button></td>
                            </tr>
                            <tr>
                                <td>XII IPA 2</td>
                                <td>36</td>
                                <td>4 jam</td>
                                <td><span class="badge badge-success">Aktif</span></td>
                                <td><button class="btn-action" onclick="viewClass()">Lihat</button></td>
                            </tr>
                            <tr>
                                <td>XII IPS 1</td>
                                <td>34</td>
                                <td>4 jam</td>
                                <td><span class="badge badge-success">Aktif</span></td>
                                <td><button class="btn-action" onclick="viewClass()">Lihat</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

    <script src="../js/database.js"></script>
    <script src="../js/database-helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/teacher-dashboard.js"></script>
</body>
</html>
